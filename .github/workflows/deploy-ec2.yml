name: Deploy to EC2

on:
  push:
    branches: [main] # main 브랜치에 push 될 때 자동 트리거

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub Actions 러너 환경 (Ubuntu)
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3 # SSH로 EC2에 접속해 명령어를 실행하는 액션
        with:
          host: ${{ secrets.EC2_HOST }}       # EC2 퍼블릭 IP (GitHub Secrets에서 주입)
          username: ${{ secrets.EC2_USER }}   # EC2 접속 유저명 (예: ubuntu, ec2-user)
          key: ${{ secrets.EC2_SSH_KEY }}     # EC2 접속용 PEM 키 (GitHub Secrets에서 주입)
          command_timeout: 15m               # 빌드 시간 고려해 타임아웃 15분으로 설정
          script: |
            set -e                           # 명령어 중 하나라도 실패하면 즉시 중단
            cd ~/hcl-hz.github.io            # 프로젝트 디렉토리로 이동
            git fetch origin main            # 원격 main 브랜치 최신 커밋 가져오기
            git reset --hard origin/main     # 로컬을 원격 main 상태로 강제 동기화 (로컬 변경사항 무시)
            docker compose down --remove-orphans  # 실행 중인 컨테이너 중지 및 삭제 (고아 컨테이너도 함께 제거)
            docker compose build --no-cache  # 캐시 없이 이미지 새로 빌드 (항상 최신 소스 반영)
            docker compose up -d             # 컨테이너를 백그라운드로 재시작
            docker image prune -f            # 사용하지 않는 이미지 삭제 (디스크 정리)
